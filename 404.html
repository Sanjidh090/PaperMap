<!DOCTYPE html>

<head>

<title>Page Not Found | PaperMap</title>

<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<style>
:root {
  --bg: #ffffff;
  --text: #0f172a;
  --muted: #475569;
  --amber: #f59e0b;
  --border: rgba(15,23,42,0.12);
  --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  font-family: var(--sans);
  color: var(--text);
  background:
    radial-gradient(circle at 8% 0%, rgba(245,158,11,0.14), transparent 36%),
    radial-gradient(circle at 92% 14%, rgba(59,130,246,0.08), transparent 34%),
    linear-gradient(180deg, #fffefb 0%, #ffffff 45%, #fbfdff 100%);
}
.card {
  width: min(640px, 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(6px);
  padding: 28px;
  box-shadow: 0 20px 50px rgba(15,23,42,0.08);
}
.kicker {
  font-family: var(--mono);
  color: var(--amber);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
h1 {
  margin: 10px 0 10px;
  font-size: clamp(1.8rem, 4vw, 2.4rem);
  line-height: 1.15;
}
p {
  margin: 0;
  color: var(--muted);
  line-height: 1.7;
}
.actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn {
  text-decoration: none;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 14px;
  border: 1px solid var(--border);
}
.btn-primary {
  background: var(--amber);
  color: #111;
  border-color: transparent;
  font-weight: 600;
}
.btn-ghost {
  color: var(--text);
  background: #fff;
}
</style>
</head>
<body>
  <main class="card">
    <div class="kicker">Error 404</div>
    <h1>Page not found</h1>
    <p>The link may be broken or the page may have moved. You can return to the main library or open one of the featured explainers below.</p>
    <div class="actions">
      <a class="btn btn-primary" href="./index.html">Go to Home</a>
      <a class="btn btn-ghost" href="./Attention_Is_All_You_Need.html">Transformer Guide</a>
